name: Deploy MkDocs to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install Python dependencies
        run: pip install mkdocs-material mkdocs-print-site-plugin

      - name: Install Puppeteer
        run: npm install puppeteer

      - name: Build site
        run: mkdocs build --strict

      - name: Generate combined Markdown
        run: |
          sh .github/scripts/preprocess-docs.sh
          cp combined.md site/Nobl9_SLO_Best_Practices_Guide.md

      - name: Generate PDF
        run: |
          cd site && python -m http.server 8000 &
          sleep 2
          node .github/scripts/export-to-pdf.js \
            http://localhost:8000/print_page/ \
            site/Nobl9_SLO_Best_Practices_Guide.pdf \
            'Nobl9 SLO Best Practices Guide'

      - name: Upload artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
